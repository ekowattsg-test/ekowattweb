<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="56" height="48" viewBox="0 0 56 48" role="img" aria-labelledby="title desc" overflow="hidden">
  <title id="title">EKOWATT icon</title>
  <desc id="desc">Abstract progressive mark in green gradient symbolizing energy and growth</desc>
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#6ba11a" />
      <stop offset="60%" stop-color="#7da92b" />
      <stop offset="100%" stop-color="#5f8920" />
    </linearGradient>
    <!-- drop shadow removed to prevent rendering artifacts on header -->
  </defs>

  <!-- Circular gradient base -->
  <g transform="translate(8,4)">
    <circle cx="20" cy="20" r="20" fill="url(#g1)" />

    <!-- Internal progressive accent (keeps inside circle) -->
    <path d="M12 26 C16 20, 24 18, 28 14" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" opacity="0.95" />

    <!-- Negative-space lightning bolt (white) -->
    <path d="M18 8 L26 18 L22 18 L30 30 L18 20 L22 20 L14 8 Z" fill="#ffffff" opacity="0.98"/>
  </g>

  <!-- decorative arc removed per request -->
</svg>
